<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comunidade Bíblica - Cadastro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-container">
      <div class="auth-left">
        <div class="auth-message">
          <h1>Junte-se à <span>Comunidade</span></h1>
          <p>Crie sua conta e comece a compartilhar a palavra de Deus com outros fiéis.</p>

          <div class="auth-features">
            <div class="auth-feature">
              <div class="auth-feature-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
              </div>
              <span>Perfil personalizado</span>
            </div>
            <div class="auth-feature">
              <div class="auth-feature-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="12" y1="8" x2="12" y2="16"></line>
                  <line x1="8" y1="12" x2="16" y2="12"></line>
                </svg>
              </div>
              <span>Publique seus versículos</span>
            </div>
            <div class="auth-feature">
              <div class="auth-feature-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                </svg>
              </div>
              <span>Interaja com outros</span>
            </div>
          </div>
        </div>
      </div>

      <div class="auth-card">
        <div class="auth-logo-wrapper">
          <div class="logo" style="justify-content: center; margin-bottom: 8px;">
            <div class="logo-icon">✝</div>
          </div>
          <h1 class="auth-logo">Criar Conta</h1>
          <p class="auth-subtitle">Junte-se à nossa comunidade de fé</p>
        </div>

        <form id="register-form">
          <div class="form-group">
            <label for="name">Nome Completo</label>
            <input type="text" id="name" class="form-input" placeholder="Seu nome completo" required>
          </div>

          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" class="form-input" placeholder="Seu melhor e-mail" required>
          </div>

          <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" class="form-input" placeholder="Crie uma senha segura" required>
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirmar Senha</label>
            <input type="password" id="confirm-password" class="form-input" placeholder="Confirme sua senha" required>
          </div>

          <div id="register-message" style="display:none; text-align:center; margin-bottom:16px; font-size:14px;"></div>

          <button type="submit" class="btn btn-primary" id="register-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="8.5" cy="7" r="4"></circle>
              <line x1="20" y1="8" x2="20" y2="14"></line>
              <line x1="23" y1="11" x2="17" y2="11"></line>
            </svg>
            Criar Conta
          </button>
        </form>

        <p class="auth-link">
          Já tem uma conta? <a href="index.html">Entre agora</a>
        </p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if (auth.isLoggedIn()) {
      window.location.href = 'feed.html';
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const btn = document.getElementById('register-btn');
      const msg = document.getElementById('register-message');

      if (password !== confirmPassword) {
        msg.textContent = 'As senhas não conferem';
        msg.style.color = '#e53e3e';
        msg.style.display = 'block';
        return;
      }

      if (password.length < 8) {
        msg.textContent = 'Senha deve ter pelo menos 8 caracteres';
        msg.style.color = '#e53e3e';
        msg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Criando conta...';

      const result = await auth.register(email, password, name);

      btn.disabled = false;
      btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>Criar Conta`;

      if (result.success) {
        window.location.href = 'feed.html';
      } else {
        msg.textContent = result.error;
        msg.style.color = '#e53e3e';
        msg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
