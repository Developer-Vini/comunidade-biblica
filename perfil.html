<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil - Comunidade Bíblica</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="feed.html" class="logo">
        <div class="logo-icon">✝</div>
        Comunidade Bíblica
      </a>
      <nav class="header-nav">
        <a href="feed.html">Feed</a>
        <a href="criar.html" class="btn-primary">+ Nova Postagem</a>
        <a href="#" id="logout-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      <div id="profile-header" class="profile-header">
        <div class="profile-avatar" id="profile-avatar">?</div>
        <h1 class="profile-name" id="profile-name">Carregando...</h1>
        <p class="profile-bio" id="profile-bio">Carregando...</p>
        <div class="profile-stats">
          <div class="stat">
            <div class="stat-number" id="stat-posts">0</div>
            <div class="stat-label">Postagens</div>
          </div>
          <div class="stat">
            <div class="stat-number" id="stat-likes">0</div>
            <div class="stat-label">Curtidas</div>
          </div>
          <div class="stat">
            <div class="stat-number" id="stat-member">--</div>
            <div class="stat-label">Membro desde</div>
          </div>
        </div>
      </div>

      <h2 class="profile-title">Minhas Reflexões</h2>

      <div id="loading" style="text-align:center; padding:40px; color:var(--text-muted);">
        Carregando suas reflexões...
      </div>

      <div id="posts-container"></div>

      <div id="empty-state" class="empty-state" style="display:none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </svg>
        <p>Você ainda não publicou nenhuma reflexão.</p>
        <a href="criar.html" class="btn btn-primary" style="margin-top:20px; display:inline-flex;">Criar Primeira Postagem</a>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    const user = auth.getUser();

    if (!user) {
      window.location.href = 'index.html';
    }

    document.getElementById('logout-btn').addEventListener('click', (e) => {
      e.preventDefault();
      auth.logout();
    });

    document.getElementById('profile-avatar').textContent = getInitials(user.name);
    document.getElementById('profile-name').textContent = user.name;
    document.getElementById('profile-bio').textContent = user.bio || 'Sem bio ainda';

    async function loadUserProfile() {
      const loading = document.getElementById('loading');
      const container = document.getElementById('posts-container');
      const emptyState = document.getElementById('empty-state');

      try {
        const userResult = await users.getById(user.id);
        if (userResult.success) {
          const userData = userResult.data.user;
          document.getElementById('stat-posts').textContent = userData.post_count || 0;
          document.getElementById('stat-likes').textContent = userData.like_count || 0;
          if (userData.created_at) {
            const date = new Date(userData.created_at);
            document.getElementById('stat-member').textContent = date.toLocaleDateString('pt-BR', { month: 'short', year: 'numeric' });
          }
        }

        const postsResult = await posts.getUserPosts(user.id);
        loading.style.display = 'none';

        if (!postsResult.success || postsResult.data.posts.length === 0) {
          emptyState.style.display = 'block';
          return;
        }

        container.innerHTML = postsResult.data.posts.map(post => `
          <article class="post-card" data-id="${post.id}">
            <div class="post-header">
              <div class="post-avatar">${getInitials(user.name)}</div>
              <div class="post-user-info">
                <h3>${escapeHtml(user.name)}</h3>
                <span>${timeAgo(post.created_at)}</span>
              </div>
            </div>
            <p class="post-verse">"${escapeHtml(post.verse)}"${post.reference ? ' — ' + escapeHtml(post.reference) : ''}</p>
            <p class="post-reflection">${escapeHtml(post.reflection)}</p>
            <div class="post-actions">
              <button class="action-btn like-btn" data-id="${post.id}">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="${post.is_liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
                  <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
                <span class="like-count">${post.like_count}</span>
              </button>
              <button class="action-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                Comentar
              </button>
              <button class="action-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="18" cy="5" r="3"></circle>
                  <circle cx="6" cy="12" r="3"></circle>
                  <circle cx="18" cy="19" r="3"></circle>
                  <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                  <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                </svg>
                Compartilhar
              </button>
            </div>
          </article>
        `).join('');

      } catch (error) {
        loading.textContent = 'Erro ao carregar perfil';
        console.error(error);
      }
    }

    function getInitials(name) {
      if (!name) return '?';
      return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadUserProfile();
  </script>
</body>
</html>
