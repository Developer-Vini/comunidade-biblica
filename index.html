<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comunidade Bíblica - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-container">
      <div class="auth-left">
        <div class="auth-message">
          <h1>Bem-vindo à <span>Comunidade Bíblica</span></h1>
          <p>Conecte-se com outros fiéis, compartilhe versículos e reflexiones que inspiram.</p>

          <div class="auth-features">
            <div class="auth-feature">
              <div class="auth-feature-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
              </div>
              <span>Compartilhe sua fé</span>
            </div>
            <div class="auth-feature">
              <div class="auth-feature-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                  <circle cx="9" cy="7" r="4"></circle>
                  <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                  <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
              </div>
              <span>Conecte-se com a comunidade</span>
            </div>
            <div class="auth-feature">
              <div class="auth-feature-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                  <path d="M2 17l10 5 10-5"></path>
                  <path d="M2 12l10 5 10-5"></path>
                </svg>
              </div>
              <span>Cresça espiritualmente</span>
            </div>
          </div>
        </div>
      </div>

      <div class="auth-card">
        <div class="auth-logo-wrapper">
          <div class="logo" style="justify-content: center; margin-bottom: 8px;">
            <div class="logo-icon">✝</div>
          </div>
          <h1 class="auth-logo">Comunidade Bíblica</h1>
          <p class="auth-subtitle">Entre na sua conta para continuar</p>
        </div>

        <form id="login-form">
          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" class="form-input" placeholder="Seu e-mail" required>
          </div>

          <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" class="form-input" placeholder="Sua senha" required>
          </div>

          <div id="login-message" style="display:none; text-align:center; margin-bottom:16px; font-size:14px;"></div>

          <button type="submit" class="btn btn-primary" id="login-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
              <polyline points="10 17 15 12 10 7"></polyline>
              <line x1="15" y1="12" x2="3" y2="12"></line>
            </svg>
            Entrar
          </button>
        </form>

        <p class="auth-link">
          Não tem uma conta? <a href="cadastro.html">Cadastre-se gratuitamente</a>
        </p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if (auth.isLoggedIn()) {
      window.location.href = 'feed.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const msg = document.getElementById('login-message');

      btn.disabled = true;
      btn.textContent = 'Entrando...';

      const result = await auth.login(email, password);

      btn.disabled = false;
      btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>Entrar`;

      if (result.success) {
        window.location.href = 'feed.html';
      } else {
        msg.textContent = result.error;
        msg.style.color = '#e53e3e';
        msg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
