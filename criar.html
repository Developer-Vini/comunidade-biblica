<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Postagem - Comunidade Bíblica</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="feed.html" class="logo">
        <div class="logo-icon">✝</div>
        Comunidade Bíblica
      </a>
      <nav class="header-nav">
        <a href="feed.html">Feed</a>
        <a href="perfil.html" style="color: var(--primary);">Perfil</a>
        <a href="#" id="logout-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      <div class="create-post-container">
        <h1 class="create-post-title">Nova Postagem</h1>

        <div class="create-post-card">
          <form id="create-post-form">
            <div class="form-group">
              <label for="verse">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 6px;">
                  <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                  <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                Versículo Bíblico
              </label>
              <input type="text" id="verse" class="form-input" placeholder="Digite o versículo bíblico que deseja compartilhar..." required>
            </div>

            <div class="form-group">
              <label for="reference">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 6px;">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="12" y1="8" x2="12" y2="12"></line>
                  <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                Referência (Livro, Capítulo e Versículo)
              </label>
              <input type="text" id="reference" class="form-input" placeholder="Ex: João 3:16">
            </div>

            <div class="form-group">
              <label for="reflection">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 6px;">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                Sua Reflexão
              </label>
              <textarea id="reflection" class="form-input" placeholder="Escreva sua reflexão pessoal sobre este versículo. Como ele toca sua vida? O que Deus está te dizendo?" required></textarea>
            </div>

            <div id="create-message" style="display:none; text-align:center; margin-bottom:16px; font-size:14px;"></div>

            <button type="submit" class="btn btn-primary btn-create" id="create-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
              Publicar Reflexão
            </button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    if (!auth.isLoggedIn()) {
      window.location.href = 'index.html';
    }

    document.getElementById('logout-btn').addEventListener('click', (e) => {
      e.preventDefault();
      auth.logout();
    });

    document.getElementById('create-post-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const verse = document.getElementById('verse').value;
      const reference = document.getElementById('reference').value;
      const reflection = document.getElementById('reflection').value;
      const btn = document.getElementById('create-btn');
      const msg = document.getElementById('create-message');

      btn.disabled = true;
      btn.textContent = 'Publicando...';

      const result = await posts.create(verse, reference, reflection);

      btn.disabled = false;
      btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>Publicar Reflexão`;

      if (result.success) {
        window.location.href = 'feed.html';
      } else {
        msg.textContent = result.error;
        msg.style.color = '#e53e3e';
        msg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
